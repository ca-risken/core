syntax = "proto3";

package core.org_iam;
option go_package = "github.com/ca-risken/core/proto/org_iam";

import "org_iam/entity.proto";
import "validate/validate.proto";

message ListOrgPolicyRequest {
  uint32 organization_id = 1;
  string name = 2 [ (validate.rules).string.max_len = 64 ];
  uint32 role_id = 3;
}

message ListOrgPolicyResponse { repeated uint32 policy_id = 1; }

message GetOrgPolicyRequest {
  uint32 organization_id = 1 [ (validate.rules).uint32.gt = 0 ]; // Required
  uint32 policy_id = 2 [ (validate.rules).uint32.gt = 0 ];       // Required
}

message GetOrgPolicyResponse { OrgPolicy policy = 1; }

message PutOrgPolicyRequest {
  uint32 organization_id = 1 [ (validate.rules).uint32.gt = 0 ]; // Required
  string name = 2
      [ (validate.rules).string = {min_len : 1, max_len : 64} ];  // Required
  string action_ptn = 3 [ (validate.rules).string.min_len = 1 ];  // Required
  string project_ptn = 4 [ (validate.rules).string.min_len = 1 ]; // Required
}

message PutOrgPolicyResponse { OrgPolicy policy = 1; }

message DeleteOrgPolicyRequest {
  uint32 organization_id = 1 [ (validate.rules).uint32.gt = 0 ]; // Required
  uint32 policy_id = 2 [ (validate.rules).uint32.gt = 0 ];       // Required
}

message AttachOrgPolicyRequest {
  uint32 role_id = 1 [ (validate.rules).uint32.gt = 0 ];         // Required
  uint32 policy_id = 2 [ (validate.rules).uint32.gt = 0 ];       // Required
  uint32 organization_id = 3 [ (validate.rules).uint32.gt = 0 ]; // Required
}

message AttachOrgPolicyResponse { OrgPolicy policy = 1; }

message DetachOrgPolicyRequest {
  uint32 role_id = 1 [ (validate.rules).uint32.gt = 0 ];         // Required
  uint32 policy_id = 2 [ (validate.rules).uint32.gt = 0 ];       // Required
  uint32 organization_id = 3 [ (validate.rules).uint32.gt = 0 ]; // Required
}
